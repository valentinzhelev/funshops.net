<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">Продукт | Моят Забавен Магазин</title>
    <meta name="description" content="Ръчно изработена бутилка за ракия с български фолклорен мотив.">

    <link rel="canonical" id="canonical" href="https://www.funshops.net/products.html">
    <meta property="og:type" content="product">
    <meta property="og:site_name" content="Моят Забавен Магазин">
    <meta property="og:locale" content="bg_BG">
    <meta property="og:title" id="ogTitle" content="Ръчно изработена бутилка | Моят Забавен Магазин">
    <meta property="og:description" id="ogDesc" content="Ръчно изработена бутилка за ракия с български фолклорен мотив.">
    <meta property="og:image" id="ogImage" content="https://www.funshops.net/images/og-cover.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" id="twImage" content="https://www.funshops.net/images/og-cover.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.funshops.net">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Marck+Script&family=Yeseva+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

<main class="pdp">
    <div class="container">
        <div class="pdp-grid" id="pdp">
            <div class="pdp-gallery">
                <div class="pdp-main-img" id="mainImgWrap"><img id="mainImg" src="" alt="" decoding="async" fetchpriority="high"></div>
                <div class="pdp-thumbs" id="thumbs"></div>
            </div>
            <div class="pdp-info">
                <div class="breadcrumb"><a href="index.html">Начало</a> / <a href="products.html">Продукти</a> / <span id="bcName">…</span></div>
                <div class="pdp-cat" id="pdpCat"></div>
                <h1 id="pdpTitle">Зареждане…</h1>
                <div class="pdp-price" id="pdpPrice"></div>
                <div id="pdpStatus"></div>
                <div class="pdp-actions" id="pdpActions"></div>

                <div class="pdp-trust">
                    <div class="pt" id="t1"><span>Ръчна изработка</span></div>
                    <div class="pt" id="t2"><span>Без лепила</span></div>
                    <div class="pt" id="t3"><span>Уникален брой</span></div>
                </div>

                <div class="pdp-desc" id="pdpDesc"></div>
                <div class="pdp-tags" id="pdpTags"></div>
                <div class="pdp-video" id="pdpVideo" style="display:none">
                    <video controls preload="metadata" playsinline id="videoEl"></video>
                    <p class="hint" id="videoErr" hidden>Неуспешно зареждане на видеото.</p>
                </div>
            </div>
        </div>

        <!-- Подобни -->
        <section class="section" style="padding-bottom:30px">
            <div class="section-head" style="margin-bottom:30px">
                <span class="eyebrow center">Може да харесате</span>
                <h2 style="font-size:clamp(1.6rem,4vw,2.6rem); margin-top:10px">Подобни творения</h2>
            </div>
            <div class="products-grid" id="related"></div>
        </section>
    </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lb-btn lb-close" id="lbClose" aria-label="Затвори"></button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="Предишна"></button>
    <img id="lbImg" src="" alt="">
    <button class="lb-btn lb-next" id="lbNext" aria-label="Следваща"></button>
    <div class="lb-count" id="lbCount"></div>
</div>

<script src="config.js"></script>
<script src="app.js?v=20260630"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const S = window.Shop;
    const idParam = new URLSearchParams(location.search).get("id");
    const matchProduct = list => list.find(x => String(x.id) === String(idParam));
    let images = [];
    let lbIndex = 0;

    // икони
    document.getElementById("lbClose").innerHTML = S.I.x;
    document.getElementById("lbPrev").innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18 9 12l6-6"/></svg>';
    document.getElementById("lbNext").innerHTML = S.I.arrow;
    document.getElementById("t1").insertAdjacentHTML("afterbegin", S.I.hand);
    document.getElementById("t2").insertAdjacentHTML("afterbegin", S.I.leaf);
    document.getElementById("t3").insertAdjacentHTML("afterbegin", S.I.shield);

    S.fetchProducts().then(async products => {
        await S.fetchReservations();
        const p = matchProduct(products) || products[0];
        if (!p) return;
        render(p, products);
    });
    document.addEventListener("reservations:changed", () => {
        S.fetchReservations(true).then(() => S.fetchProducts().then(products => {
            const p = matchProduct(products);
            if (p) render(p, products);
        }));
    });
    document.addEventListener("cart:changed", () => {
        S.fetchProducts().then(products => {
            const p = matchProduct(products);
            if (p) render(p, products);
        });
    });

    function render(p, products) {
        const titleTxt = /^\d+$/.test(String(p.name).trim()) ? "Бутилка № " + p.name : p.name;
        document.getElementById("metaTitle").textContent = titleTxt + " | Моят Забавен Магазин";
        document.getElementById("bcName").textContent = titleTxt;
        document.getElementById("pdpCat").textContent = p.category;
        document.getElementById("pdpTitle").textContent = titleTxt;
        document.getElementById("pdpDesc").textContent = p.description || "";
        updateMeta(p, titleTxt);

        images = (p.images || []).filter(s => !String(s).endsWith(".mp4"));
        const mainImg = document.getElementById("mainImg");
        mainImg.src = S.asset(images[0] || "");
        mainImg.alt = p.name;

        const thumbs = document.getElementById("thumbs");
        thumbs.innerHTML = images.map((src, i) =>
            `<div class="thumb ${i === 0 ? "active" : ""}" data-i="${i}"><img src="${S.asset(src)}" alt="${p.name} ${i+1}" loading="lazy" decoding="async"></div>`).join("");
        thumbs.querySelectorAll(".thumb").forEach(th => th.addEventListener("click", () => setMain(Number(th.dataset.i))));
        document.getElementById("mainImgWrap").addEventListener("click", () => openLightbox(currentMain));

        // статус + цена + бутони
        const inCart = S.isInCart(p.id);
        const blocked = !p.available || S.isProductBlocked(p.id);
        const priceEl = document.getElementById("pdpPrice");
        const actions = document.getElementById("pdpActions");
        const statusEl = document.getElementById("pdpStatus");

        if (blocked) {
            priceEl.style.display = "none";
            statusEl.innerHTML = `<div class="pdp-status">${!p.available ? "Този продукт вече е продаден." : "Този продукт е резервиран от друг клиент."}</div>`;
            actions.innerHTML = `<a href="products.html" class="btn btn-ghost">← Към продуктите</a>`;
        } else if (inCart) {
            priceEl.innerHTML = `${p.price} <small>€</small>`;
            statusEl.innerHTML = `<div class="pdp-status ok">Резервирана за вас — в количката (${S.RES_TTL_MIN} мин.)</div>`;
            actions.innerHTML = `
                <a href="cart.html" class="btn btn-green">Към количката →</a>
                <a href="products.html" class="btn btn-ghost">← Назад</a>`;
        } else {
            priceEl.innerHTML = `${p.price} <small>€</small>`;
            actions.innerHTML = `
                <button class="btn btn-amber" id="addBtn">Добави в количката</button>
                <a href="products.html" class="btn btn-ghost">← Назад</a>`;
            document.getElementById("addBtn").addEventListener("click", async () => {
                if (await S.addToCart(p)) renderStatusAfterAdd();
            });
        }

        function renderStatusAfterAdd() {
            actions.innerHTML = `<a href="cart.html" class="btn btn-green">Към количката →</a>
                <a href="products.html" class="btn btn-ghost">Продължи пазаруването</a>`;
        }

        // тагове
        const tags = p.tags || [];
        document.getElementById("pdpTags").innerHTML = tags.map(tg => `<span class="tag">#${tg}</span>`).join("");

        // видео
        const videoWrap = document.getElementById("pdpVideo");
        const videoEl = document.getElementById("videoEl");
        const videoErr = document.getElementById("videoErr");
        videoEl.onerror = null;
        videoErr.hidden = true;
        if (p.video) {
            videoWrap.style.display = "block";
            const vSrc = (S.videoAsset || S.asset)(p.video, p.video_ts || p.id);
            videoEl.innerHTML = "";
            videoEl.src = vSrc;
            videoEl.onerror = () => { videoErr.hidden = false; };
            videoEl.onloadeddata = () => { videoErr.hidden = true; };
            videoEl.load();
        } else {
            videoWrap.style.display = "none";
            videoEl.removeAttribute("src");
            videoEl.load();
            videoEl.onerror = null;
            videoEl.onloadeddata = null;
        }

        renderRelated(p, products);
    }

    function updateMeta(p, titleTxt) {
        const url = "https://www.funshops.net/product.php?id=" + p.id;
        const img = (p.images || []).find(s => !String(s).endsWith(".mp4")) || "";
        const imgAbs = img ? S.asset(img) : "https://www.funshops.net/images/og-cover.png";
        const desc = (p.description || (titleTxt + " — ръчно изработена бутилка с български фолклорен мотив.")).slice(0, 200);
        const set = (id, attr, val) => { const el = document.getElementById(id); if (el) el.setAttribute(attr, val); };
        set("canonical", "href", url);
        set("ogTitle", "content", titleTxt + " | Моят Забавен Магазин");
        set("ogDesc", "content", desc);
        set("ogImage", "content", imgAbs);
        set("twImage", "content", imgAbs);
        document.querySelector('meta[name="description"]').setAttribute("content", desc);

        const unavailable = !p.available || S.isProductBlocked(p.id);
        const ld = {
            "@context": "https://schema.org",
            "@type": "Product",
            "name": titleTxt,
            "image": imgAbs,
            "description": desc,
            "category": p.category,
            "brand": { "@type": "Brand", "name": "Моят Забавен Магазин" },
            "offers": {
                "@type": "Offer",
                "url": url,
                "priceCurrency": "EUR",
                "price": Number(p.price).toFixed(2),
                "availability": unavailable ? "https://schema.org/OutOfStock" : "https://schema.org/InStock"
            }
        };
        let s = document.getElementById("ldProduct");
        if (!s) { s = document.createElement("script"); s.type = "application/ld+json"; s.id = "ldProduct"; document.head.appendChild(s); }
        s.textContent = JSON.stringify(ld);
    }

    let currentMain = 0;
    function setMain(i) {
        currentMain = i;
        const mainImg = document.getElementById("mainImg");
        mainImg.style.opacity = "0";
        setTimeout(() => { mainImg.src = S.asset(images[i]); mainImg.style.opacity = "1"; }, 150);
        document.querySelectorAll(".thumb").forEach((t, idx) => t.classList.toggle("active", idx === i));
    }

    // Lightbox
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");
    function openLightbox(i) { lbIndex = i; updateLb(); lb.classList.add("open"); document.body.style.overflow = "hidden"; }
    function closeLightbox() { lb.classList.remove("open"); document.body.style.overflow = ""; }
    function updateLb() {
        lbImg.style.opacity = "0";
        setTimeout(() => { lbImg.src = S.asset(images[lbIndex]); lbImg.style.opacity = "1"; }, 120);
        document.getElementById("lbCount").textContent = (lbIndex + 1) + " / " + images.length;
    }
    function next() { lbIndex = (lbIndex + 1) % images.length; updateLb(); }
    function prev() { lbIndex = (lbIndex - 1 + images.length) % images.length; updateLb(); }
    document.getElementById("lbClose").addEventListener("click", closeLightbox);
    document.getElementById("lbNext").addEventListener("click", next);
    document.getElementById("lbPrev").addEventListener("click", prev);
    lb.addEventListener("click", e => { if (e.target === lb) closeLightbox(); });
    document.addEventListener("keydown", e => {
        if (!lb.classList.contains("open")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
    });
    // Swipe на мобилен
    let sx = 0;
    lb.addEventListener("touchstart", e => sx = e.changedTouches[0].screenX);
    lb.addEventListener("touchend", e => {
        const dx = e.changedTouches[0].screenX - sx;
        if (dx < -50) next(); else if (dx > 50) prev();
    });

    function renderRelated(p, products) {
        let rel = products.filter(x => x.available && x.id !== p.id && x.category === p.category && !S.isProductBlocked(x.id));
        if (rel.length < 4) {
            products.filter(x => x.available && x.id !== p.id && !rel.includes(x) && !S.isProductBlocked(x.id))
                .forEach(x => { if (rel.length < 4) rel.push(x); });
        }
        rel = rel.slice(0, 4);
        const grid = document.getElementById("related");
        grid.innerHTML = rel.map((x, i) => {
            const img = (x.images || []).find(s => !String(s).endsWith(".mp4")) || "";
            const href = S.productHref(x.id);
            return `<article class="product-card reveal" style="transition-delay:${i*60}ms">
              <a href="${href}" class="pc-media"><img src="${S.asset(img)}" alt="${x.name}" loading="lazy" decoding="async">
                <span class="pc-tag">${x.category}</span>
                <span class="pc-quick">Преглед ${S.I.arrow || ""}</span></a>
              <div class="pc-body"><a href="${href}"><div class="pc-name">${S.productTitle(x.name)}</div></a>
                <div class="pc-cat">${x.category}</div>
                <div class="pc-foot"><span class="pc-price">${x.price} <small>€</small></span>
                <a href="${href}" class="btn btn-ghost btn-sm">Разгледай</a></div></div></article>`;
        }).join("");
        S.observeNew(grid);
    }
});
</script>
</body>
</html>
