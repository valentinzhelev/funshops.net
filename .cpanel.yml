---
# cPanel → Git Version Control → Deploy HEAD Commit
# Clone path: /home/studioje/repositories/funshops.net
# Live path:  /home/studioje/public_html/funshops  (document root на funshops.net)
deployment:
  tasks:
    - export DEPLOYPATH=/home/studioje/public_html/funshops/
    - /bin/rsync -av
      --exclude '.git'
      --exclude '.github'
      --exclude '.gitignore'
      --exclude '.cpanel.yml'
      --exclude 'public_html.htaccess'
      --exclude 'funshops.net.zip'
      --exclude 'live_admin.html'
      --exclude 'live_admin_index.html'
      --exclude '_*.php'
      --exclude 'images/'
      --exclude 'admin/config.php'
      --exclude 'admin/data/orders.json'
      --exclude 'admin/data/visits.json'
      --exclude 'config.production.js'
      --exclude 'config.cdn.js'
      ./ $DEPLOYPATH
    - /bin/cp -f ./config.production.js $DEPLOYPATH/config.js
