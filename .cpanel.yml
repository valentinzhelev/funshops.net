---
# cPanel → Git Version Control → Deploy HEAD Commit
# Clone path: /home/studioje/repositories/funshops.net
# Live path:  /home/studioje/funshops  (document root на funshops.net)
deployment:
  tasks:
    - export DEPLOYPATH=/home/studioje/funshops/
    - /bin/rsync -av --exclude '.git' --exclude '.github' --exclude '.gitignore' --exclude '.cpanel.yml' --exclude 'public_html.htaccess' --exclude 'funshops.net.zip' --exclude 'live_admin.html' --exclude 'live_admin_index.html' --exclude '_*.php' --exclude 'images/' --exclude 'admin/config.php' --exclude 'products.json' --exclude 'categories.json' --exclude 'admin/data/categories.json' --exclude 'admin/data/settings.json' --exclude 'admin/data/orders.json' --exclude 'admin/data/visits.json' --exclude 'admin/data/reservations.json' --exclude 'content.json' --exclude 'config.production.js' --exclude 'config.cdn.js' ./ $DEPLOYPATH
    - /bin/cp -f ./config.production.js $DEPLOYPATH/config.js
    - test -f ./deploy/images.htaccess && /bin/cp -f ./deploy/images.htaccess $DEPLOYPATH/images/.htaccess || true
    - /bin/chmod 755 $DEPLOYPATH
    - /bin/chmod 775 $DEPLOYPATH/admin/data
