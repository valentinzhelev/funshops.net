<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продукти – ръчно изработени шишета | Моят Забавен Магазин</title>
    <meta name="description" content="Каталог с ръчно изработени шишета за ракия с български фолклорен мотив. Филтрирай по категория, търси и поръчай онлайн.">

    <link rel="canonical" href="https://www.funshops.net/products.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Моят Забавен Магазин">
    <meta property="og:locale" content="bg_BG">
    <meta property="og:title" content="Продукти – ръчно изработени шишета | Моят Забавен Магазин">
    <meta property="og:description" content="Каталог с ръчно изработени шишета за ракия с български фолклорен мотив. Филтрирай, търси и поръчай онлайн.">
    <meta property="og:url" content="https://www.funshops.net/products.html">
    <meta property="og:image" content="https://www.funshops.net/images/og-cover.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://www.funshops.net/images/og-cover.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.funshops.net">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Marck+Script&family=Yeseva+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

<main class="catalog">
    <div class="container">
        <div class="catalog-head">
            <span class="eyebrow center reveal">Колекцията</span>
            <h1 class="reveal d1"><span class="script">Нашите</span> продукти</h1>
            <p class="info-lead reveal d2" style="margin:14px auto 0">Всяко шише е ръчно изработено и налично в единствен брой. Изберете категория или потърсете любимия си модел.</p>
        </div>

        <div class="catalog-layout">
            <!-- Филтри -->
            <aside class="filter-rail collapsed" id="filterRail">
                <button class="rail-toggle" id="railToggle">Категории ▾</button>
                <div class="filter-body">
                    <h3>Категории</h3>
                    <div class="search-box">
                        <span id="searchIcon"></span>
                        <input type="search" id="searchInput" placeholder="Търси шише…" aria-label="Търсене">
                        <button type="button" class="search-clear" id="searchClear" aria-label="Изчисти търсенето" hidden></button>
                    </div>
                    <div class="cat-list" id="catList"></div>
                </div>
            </aside>

            <!-- Продукти -->
            <div>
                <div class="sort-row">
                    <span class="count" id="resultCount">Зареждане…</span>
                    <select id="sortSelect" aria-label="Подреждане">
                        <option value="default">Подреди: подразбиране</option>
                        <option value="price-asc">Цена: ниска → висока</option>
                        <option value="price-desc">Цена: висока → ниска</option>
                        <option value="name">Име А → Я</option>
                    </select>
                </div>
                <div class="active-filters" id="activeFilters" hidden></div>
                <div class="products-grid" id="grid"></div>
                <div class="load-more-wrap" id="loadMoreWrap" hidden>
                    <button class="btn btn-ghost" id="loadMore" type="button">Зареди още</button>
                    <p class="load-more-info" id="loadMoreInfo"></p>
                </div>
                <div id="emptyState" class="empty-state" style="display:none">
                    <span class="empty-ico" id="emptyIco"></span>
                    <p class="empty-title">Няма намерени продукти</p>
                    <p class="empty-sub">Опитайте друга категория или променете търсенето.</p>
                    <button class="btn btn-amber btn-sm" id="resetFilters" type="button">Изчисти филтрите</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const S = window.Shop;
    const PAGE = 16;
    document.getElementById("searchIcon").innerHTML = S.I.search;
    document.getElementById("searchClear").innerHTML = S.I.x;
    document.getElementById("emptyIco").innerHTML = S.I.search;

    const params = new URLSearchParams(location.search);
    let products = [];
    let categories = [];
    let activeCat = params.get("cat") || "all";
    let search = params.get("q") || "";
    let sort = params.get("sort") || "default";
    let shown = PAGE;

    // Прилагаме филтрите от URL върху контролите
    if (search) {
        document.getElementById("searchInput").value = search;
        document.getElementById("searchClear").hidden = false;
    }
    if (["price-asc", "price-desc", "name"].includes(sort)) document.getElementById("sortSelect").value = sort;

    function syncURL() {
        const q = new URLSearchParams();
        if (activeCat !== "all") q.set("cat", activeCat);
        if (search) q.set("q", search);
        if (sort !== "default") q.set("sort", sort);
        const qs = q.toString();
        history.replaceState(null, "", qs ? "?" + qs : location.pathname);
    }

    renderSkeleton();

    Promise.all([S.fetchProducts(), S.fetchCategories()]).then(([p, c]) => {
        products = p;
        categories = c;
        renderCats();
        render();
    });

    function renderSkeleton() {
        const grid = document.getElementById("grid");
        grid.innerHTML = Array.from({ length: 8 }).map(() => `
            <article class="product-card skeleton" aria-hidden="true">
              <div class="sk-media"></div>
              <div class="pc-body">
                <div class="sk-line sk-w70"></div>
                <div class="sk-line sk-w45"></div>
                <div class="sk-foot"><div class="sk-line sk-w30"></div><div class="sk-pill"></div></div>
              </div>
            </article>`).join("");
    }

    function visiblePool() {
        const sold = S.getList("soldProducts");
        const reserved = S.getList("reservedProducts");
        return products.filter(p => p.available).map(p => ({
            ...p,
            _status: sold.includes(p.id) || reserved.includes(p.id) ? "reserved" : "ok"
        }));
    }

    function counts() {
        const pool = visiblePool().filter(p => p._status === "ok");
        const c = {};
        pool.forEach(p => c[p.category] = (c[p.category] || 0) + 1);
        return c;
    }

    function renderCats() {
        const c = counts();
        const total = Object.values(c).reduce((a, b) => a + b, 0);
        const list = document.getElementById("catList");

        let html = `<button class="cat-btn ${activeCat === "all" ? "active" : ""}" data-cat="all">
            <span>Всички</span><span class="badge">${total}</span></button>`;
        html += categories.map(cat => {
            const n = c[cat] || 0;
            return `<button class="cat-btn ${activeCat === cat ? "active" : ""} ${n === 0 ? "empty" : ""}" data-cat="${cat}">
                <span>${cat}</span><span class="badge">${n}</span></button>`;
        }).join("");
        list.innerHTML = html;

        list.querySelectorAll(".cat-btn").forEach(btn => btn.addEventListener("click", () => {
            activeCat = btn.dataset.cat;
            shown = PAGE;
            renderCats();
            render();
            document.getElementById("filterRail").classList.add("collapsed");
            document.querySelector(".catalog-head").scrollIntoView({ behavior: "smooth", block: "start" });
        }));
    }

    function filteredPool() {
        let pool = visiblePool();
        if (activeCat !== "all") pool = pool.filter(p => p.category === activeCat);
        if (search) {
            const q = search.toLowerCase();
            pool = pool.filter(p => (p.name + " " + (p.description || "") + " " + (p.tags || []).join(" ")).toLowerCase().includes(q));
        }
        if (sort === "price-asc") pool.sort((a, b) => a.price - b.price);
        else if (sort === "price-desc") pool.sort((a, b) => b.price - a.price);
        else if (sort === "name") pool.sort((a, b) => String(a.name).localeCompare(String(b.name), "bg"));
        return pool;
    }

    function render(append) {
        const pool = filteredPool();
        const grid = document.getElementById("grid");
        const empty = document.getElementById("emptyState");
        const moreWrap = document.getElementById("loadMoreWrap");
        document.getElementById("resultCount").textContent = pool.length + " " + (pool.length === 1 ? "продукт" : "продукта");

        syncURL();
        renderActiveFilters();

        if (!pool.length) {
            grid.innerHTML = "";
            moreWrap.hidden = true;
            empty.style.display = "block";
            return;
        }
        empty.style.display = "none";

        const slice = pool.slice(0, shown);
        if (append) {
            const prev = grid.querySelectorAll(".product-card:not(.skeleton)").length;
            grid.insertAdjacentHTML("beforeend", slice.slice(prev).map((p, i) => card(p, prev + i)).join(""));
        } else {
            grid.innerHTML = slice.map((p, i) => card(p, i)).join("");
        }
        S.observeNew(grid);

        const remaining = pool.length - slice.length;
        if (remaining > 0) {
            moreWrap.hidden = false;
            document.getElementById("loadMore").textContent = "Зареди още (" + Math.min(remaining, PAGE) + ")";
            document.getElementById("loadMoreInfo").textContent = "Показани " + slice.length + " от " + pool.length;
        } else {
            moreWrap.hidden = true;
        }
    }

    function renderActiveFilters() {
        const bar = document.getElementById("activeFilters");
        const chips = [];
        if (activeCat !== "all") chips.push(`<button class="filter-chip" data-clear="cat">${activeCat} ${S.I.x}</button>`);
        if (search) chips.push(`<button class="filter-chip" data-clear="search">„${search}" ${S.I.x}</button>`);
        if (!chips.length) { bar.hidden = true; bar.innerHTML = ""; return; }
        bar.hidden = false;
        bar.innerHTML = `<span class="af-label">Активни филтри:</span>` + chips.join("") +
            `<button class="filter-chip clear-all" data-clear="all">Изчисти всичко</button>`;
        bar.querySelectorAll("[data-clear]").forEach(b => b.addEventListener("click", () => clearFilter(b.dataset.clear)));
    }

    function clearFilter(which) {
        if (which === "cat" || which === "all") activeCat = "all";
        if (which === "search" || which === "all") {
            search = "";
            document.getElementById("searchInput").value = "";
            document.getElementById("searchClear").hidden = true;
        }
        shown = PAGE;
        renderCats();
        render();
    }

    function card(p, i) {
        const img = (p.images || []).find(s => !String(s).endsWith(".mp4")) || "";
        const href = S.productHref(p.id);
        const reserved = p._status === "reserved";
        const title = S.productTitle(p.name);
        const foot = reserved
            ? `<div class="pc-status">Резервиран</div>`
            : `<div class="pc-foot">
                 <span class="pc-price">${p.price} <small>€</small></span>
                 <button class="btn btn-amber btn-sm pc-add" data-id="${p.id}">Добави</button>
               </div>`;
        return `
        <article class="product-card reveal${reserved ? " is-reserved" : ""}" style="transition-delay:${(i % 4) * 60}ms">
          <a href="${href}" class="pc-media">
            <img src="${S.asset(img)}" alt="${p.name}" loading="lazy" decoding="async">
            <span class="pc-tag">${p.category}</span>
            <span class="pc-quick">Преглед ${S.I.arrow || ""}</span>
          </a>
          <div class="pc-body">
            <a href="${href}"><div class="pc-name">${title}</div></a>
            <div class="pc-cat">${p.category}</div>
            ${foot}
          </div>
        </article>`;
    }

    document.getElementById("grid").addEventListener("click", e => {
        const btn = e.target.closest(".pc-add");
        if (!btn) return;
        e.preventDefault();
        const p = products.find(x => x.id === Number(btn.dataset.id));
        if (p && S.addToCart(p)) { renderCats(); render(); }
    });

    // Търсене (с дебоунс)
    let tmr;
    const searchInput = document.getElementById("searchInput");
    const searchClear = document.getElementById("searchClear");
    searchInput.addEventListener("input", e => {
        searchClear.hidden = !e.target.value;
        clearTimeout(tmr);
        tmr = setTimeout(() => { search = e.target.value.trim(); shown = PAGE; render(); }, 200);
    });
    searchClear.addEventListener("click", () => clearFilter("search"));

    document.getElementById("sortSelect").addEventListener("change", e => { sort = e.target.value; shown = PAGE; render(); });
    document.getElementById("loadMore").addEventListener("click", () => { shown += PAGE; render(true); });
    document.getElementById("resetFilters").addEventListener("click", () => clearFilter("all"));
    document.getElementById("railToggle").addEventListener("click", () =>
        document.getElementById("filterRail").classList.toggle("collapsed"));

    document.addEventListener("cart:changed", () => { renderCats(); render(); });
});
</script>
</body>
</html>
