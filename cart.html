<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Количка | Моят Забавен Магазин</title>
    <meta name="description" content="Вашата количка с избрани ръчно изработени бутилки.">
    <meta name="robots" content="noindex, follow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Marck+Script&family=Yeseva+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
</head>
<body>

<main class="page-shell">
    <div class="container">
        <div class="page-title" style="margin-bottom:34px">
            <span class="eyebrow center reveal" data-cms="cart.eyebrow">Почти готови</span>
            <h1 class="reveal d1"><span class="script" data-cms="cart.title_script">Вашата</span> <span data-cms="cart.title_main">количка</span></h1>
        </div>

        <div style="max-width:820px; margin:0 auto" class="reveal">
            <p class="info-lead" style="text-align:center; margin-bottom:18px; font-size:.95rem" data-cms="cart.intro">
                Продуктите в количката се резервират за 30 минути — достатъчно време да финализирате поръчката.
                След това резервацията изтича и бутилката отново става свободна за други клиенти.
            </p>
            <div class="panel">
                <div id="cartItems"></div>
                <div id="summary"></div>
            </div>
        </div>
    </div>
</main>

<div class="section" style="padding-top:0"></div>

<script src="config.js"></script>
<script src="app.js?v=20260630"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const S = window.Shop;
    let cms = {};

    document.addEventListener("cms:ready", e => { cms = e.detail || {}; render(); });

    function render() {
        const cart = S.getCart();
        const items = document.getElementById("cartItems");
        const summary = document.getElementById("summary");

        if (!cart.length) {
            const emptyTitle = (cms.cart && cms.cart.empty_title) || "Все още няма добавени продукти.";
            const emptyBtn = (cms.cart && cms.cart.empty_btn) || "Разгледай продуктите";
            items.innerHTML = `<div class="drawer-empty" style="padding:50px 10px">${S.I.cart}
                <p style="font-size:1.15rem; margin-bottom:18px">${emptyTitle}</p>
                <a href="products.html" class="btn btn-amber">${emptyBtn}</a></div>`;
            summary.innerHTML = "";
            return;
        }

        items.innerHTML = cart.map(i => `
          <div class="cart-row" data-id="${i.id}">
            <img src="${S.asset(i.image)}" alt="${i.title}" loading="lazy">
            <div>
              <div class="cr-name">${i.title}</div>
              <div class="cr-price">${S.money(i.price)}</div>
            </div>
            <button class="btn btn-ghost btn-sm cr-remove" data-id="${i.id}">Премахни</button>
          </div>`).join("");

        const total = cart.reduce((s, i) => s + Number(i.price), 0);
        summary.innerHTML = `
          <div class="cart-summary">
            <div class="row"><span>Брой продукти</span><span>${cart.length}</span></div>
            <div class="row"><span>Доставка</span><span>по тарифа на куриера</span></div>
            <div class="grand"><span>Общо</span><b>${S.money(total)}</b></div>
            <p class="ship-note">Доставката се заплаща при получаване (наложен платеж). Начинът на доставка избирате на следваща стъпка.</p>
          </div>
          <a href="order.html" class="btn btn-amber btn-block" style="margin-top:22px">Финализирай поръчката&nbsp;&nbsp;→</a>
          <a href="products.html" class="btn btn-ghost btn-block" style="margin-top:10px">Продължи пазаруването</a>`;

        items.querySelectorAll(".cr-remove").forEach(btn => btn.addEventListener("click", async () => {
            const row = btn.closest(".cart-row");
            row.style.transition = "opacity .25s, transform .25s";
            row.style.opacity = "0"; row.style.transform = "translateX(20px)";
            setTimeout(async () => { await S.removeFromCart(Number(btn.dataset.id)); render(); }, 220);
        }));
    }

    render();
});
</script>
</body>
</html>
